# Chorala — full self-host stack. One command:
#
#   cp .env.example .env   # set CHORALA_AUTH_SECRET (openssl rand -base64 32)
#   docker compose up
#
# Caddy is the only service that publishes ports (80/443). Postgres + Redis stay on
# the internal network. Set CHORALA_DOMAIN in .env for automatic HTTPS.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: chorala
      POSTGRES_PASSWORD: chorala
      POSTGRES_DB: chorala
    volumes:
      - chorala_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chorala -d chorala']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - chorala_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://chorala:chorala@postgres:5432/chorala
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://chorala:chorala@postgres:5432/chorala
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      api: { condition: service_started }

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://chorala:chorala@postgres:5432/chorala
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      api: { condition: service_started }

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      CHORALA_DOMAIN: ${CHORALA_DOMAIN:-:80}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - chorala_caddydata:/data
      - chorala_caddyconfig:/config
    depends_on:
      - api
      - dashboard

volumes:
  chorala_pgdata:
  chorala_redisdata:
  chorala_caddydata:
  chorala_caddyconfig:
